<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Age.ai | Нейросетевой калькулятор возраста</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap');

        :root {
            --bg: #09090b;
            --card-bg: #18181b;
            --text: #f4f4f5;
            --accent: #6366f1;
            --accent-hover: #4f46e5;
            --border: #27272a;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Inter', sans-serif;
        }

        body {
            background-color: var(--bg);
            color: var(--text);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
            background-image: radial-gradient(circle at 50% -20%, #3730a3 0%, var(--bg) 50%);
        }

        .container {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 24px;
            padding: 40px;
            width: 100%;
            max-width: 480px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            text-align: center;
            position: relative;
            overflow: hidden;
        }

        .container::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 4px;
            background: linear-gradient(90deg, #6366f1, #a855f7, #ec4899);
        }

        h1 {
            font-size: 28px;
            font-weight: 800;
            margin-bottom: 10px;
            background: linear-gradient(to right, #fff, #a1a1aa);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        p.subtitle {
            color: #a1a1aa;
            font-size: 14px;
            margin-bottom: 30px;
        }

        .input-group {
            text-align: left;
            margin-bottom: 24px;
        }

        label {
            display: block;
            font-size: 14px;
            font-weight: 600;
            margin-bottom: 8px;
            color: #e4e4e7;
        }

        input[type="date"] {
            width: 100%;
            padding: 14px 16px;
            border-radius: 12px;
            border: 1px solid var(--border);
            background: #09090b;
            color: white;
            font-size: 16px;
            outline: none;
            transition: border-color 0.2s;
            color-scheme: dark;
        }

        input[type="date"]:focus {
            border-color: var(--accent);
        }

        button {
            width: 100%;
            padding: 16px;
            border: none;
            border-radius: 12px;
            background: var(--accent);
            color: white;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s, transform 0.1s;
        }

        button:hover {
            background: var(--accent-hover);
        }

        button:active {
            transform: scale(0.98);
        }

        #result-card {
            display: none;
            margin-top: 30px;
            padding-top: 30px;
            border-top: 1px solid var(--border);
            animation: fadeIn 0.5s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .image-container {
            width: 100%;
            height: 200px;
            border-radius: 16px;
            overflow: hidden;
            margin-bottom: 20px;
            background: #27272a;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 1px solid var(--border);
        }

        .image-container img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: none;
        }

        .image-placeholder {
            color: #71717a;
            font-size: 14px;
        }

        .age-display {
            font-size: 48px;
            font-weight: 800;
            color: #fff;
            margin-bottom: 8px;
            text-shadow: 0 0 20px rgba(99, 102, 241, 0.4);
        }

        .error-margin {
            display: inline-block;
            padding: 6px 12px;
            background: rgba(236, 72, 153, 0.1);
            color: #ec4899;
            border-radius: 20px;
            font-size: 14px;
            font-weight: 600;
            border: 1px solid rgba(236, 72, 153, 0.2);
        }
        
        .loader {
            display: none;
            width: 24px;
            height: 24px;
            border: 3px solid rgba(255,255,255,0.3);
            border-radius: 50%;
            border-top-color: #fff;
            animation: spin 1s ease-in-out infinite;
            margin: 0 auto;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Age.ai</h1>
        <p class="subtitle">Предиктивный анализ вашего возраста</p>

        <div class="input-group">
            <label for="dob">Дата рождения</label>
            <input type="date" id="dob" required>
        </div>

        <button id="calc-btn">
            <span id="btn-text">Анализировать</span>
            <div class="loader" id="btn-loader"></div>
        </button>

        <div id="result-card">
            <div class="image-container" id="img-container">
                <span class="image-placeholder" id="img-placeholder">Поиск фото...</span>
                <img id="user-image" alt="User Image">
            </div>
            
            <p style="color: #a1a1aa; font-size: 14px; margin-bottom: 4px;">Ваш расчетный возраст:</p>
            <div class="age-display" id="age-text">0.0</div>
            <div class="error-margin" id="error-text">± 0 лет погрешности</div>
        </div>
    </div>

    <script>
        const dobInput = document.getElementById('dob');
        const calcBtn = document.getElementById('calc-btn');
        const btnText = document.getElementById('btn-text');
        const btnLoader = document.getElementById('btn-loader');
        const resultCard = document.getElementById('result-card');
        const userImage = document.getElementById('user-image');
        const imgPlaceholder = document.getElementById('img-placeholder');
        const ageText = document.getElementById('age-text');
        const errorText = document.getElementById('error-text');

        function loadImage() {
            const testImg = new Image();
            testImg.onload = function() {
                userImage.src = testImg.src;
                userImage.style.display = 'block';
                imgPlaceholder.style.display = 'none';
            };
            testImg.onerror = function() {
                imgPlaceholder.textContent = "Фото 'IMG_5984.jpeg' не найдено рядом с файлом";
            };
            testImg.src = 'IMG_5984.jpeg';
        }

        calcBtn.addEventListener('click', () => {
            const dobVal = dobInput.value;
            if (!dobVal) {
                alert('Пожалуйста, выберите дату рождения');
                return;
            }

            // Имитация загрузки
            btnText.style.display = 'none';
            btnLoader.style.display = 'block';
            resultCard.style.display = 'none';
            calcBtn.disabled = true;

            setTimeout(() => {
                const dob = new Date(dobVal);
                const now = new Date();
                
                // Считаем реальный возраст в годах
                const diffTime = Math.abs(now - dob);
                const exactAge = diffTime / (1000 * 60 * 60 * 24 * 365.25);
                
                // Формируем случайную погрешность
                const errorMargin = (Math.random() * 5 + 0.5).toFixed(1);
                const sign = Math.random() > 0.5 ? 1 : -1;
                
                // Итоговый возраст с ошибкой
                let displayedAge = (exactAge + (sign * Math.random() * errorMargin)).toFixed(1);
                if (displayedAge < 0) displayedAge = 0;

                ageText.textContent = displayedAge;
                errorText.textContent = `Погрешность ИИ: ± ${errorMargin} лет`;

                // Ищем конкретную картинку
                userImage.style.display = 'none';
                imgPlaceholder.style.display = 'inline';
                imgPlaceholder.textContent = "Загрузка фото 'IMG_5984.jpeg'...";
                loadImage();

                btnText.style.display = 'block';
                btnLoader.style.display = 'none';
                calcBtn.disabled = false;
                resultCard.style.display = 'block';
            }, 1200); // Таймер на "вычисления"
        });
    </script>
</body>
</html>
